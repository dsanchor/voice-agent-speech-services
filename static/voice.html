<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent — Session</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="voice-page">
  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <span id="conn-dot" class="dot"></span>
      <span id="conn-label">Connecting…</span>
    </div>
    <a href="/index.html" class="settings-link">⚙ Settings</a>
  </header>

  <!-- Main area -->
  <main class="voice-main">
    <!-- Mic area -->
    <div class="mic-area">
      <button id="mic-btn" class="mic-button" disabled aria-label="Start Microphone">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <span id="mic-state" class="mic-state">Connecting…</span>
    </div>

    <!-- Transcript area -->
    <div id="transcript" class="transcript">
      <div id="partial-transcript" class="partial-bubble"></div>
      <!-- Chat bubbles appended here -->
    </div>
  </main>

  <!-- Bottom bar -->
  <footer class="bottom-bar">
    <span id="session-info" class="session-info"></span>
    <button id="end-btn" class="btn-danger">End Session</button>
  </footer>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/audio.js"></script>
  <script src="/js/voice.js"></script>
</body>
</html>
