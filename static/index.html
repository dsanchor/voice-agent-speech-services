<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>🎙️ Voice Agent</h1>
    <p class="subtitle">Continuous conversation with the AI agent</p>

    <div class="connection">
      <span id="conn-dot" class="dot"></span>
      <span id="conn-label">Disconnected</span>
    </div>

    <div class="controls">
      <button id="mic-btn" disabled aria-label="Start Microphone">
        <span class="icon"></span>
      </button>
      <button id="stop-speaking-btn" class="btn-secondary" disabled>Stop Speaking</button>
      <button id="clear-btn" class="btn-secondary">Clear Chat</button>
    </div>

    <div id="status-bar" class="status-bar">
      <span id="status-text">Connecting…</span>
    </div>

    <div id="partial-transcript" class="partial-transcript"></div>

    <div id="chat-history" class="chat-history">
      <!-- Chat messages are appended here -->
    </div>
  </div>

  <script src="/js/voice.js"></script>
</body>
</html>
